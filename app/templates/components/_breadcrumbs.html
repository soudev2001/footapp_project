<!-- Global Breadcrumb Navbar -->
<header
    class="h-16 lg:h-20 bg-white/80 dark:bg-surface-950/80 backdrop-blur-md border-b border-slate-200 dark:border-white/5 flex items-center px-4 lg:px-8 z-20 shrink-0 sticky top-0">
    <div class="flex items-center gap-3 w-full overflow-x-auto no-scrollbar">
        <!-- Mobile Sidebar Toggle -->
        <button onclick="toggleAdminSidebar()"
            class="lg:hidden shrink-0 w-8 h-8 rounded-lg bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-900 dark:text-white transition-colors">
            <i class="fa-solid fa-bars text-sm"></i>
        </button>

        <!-- Breadcrumbs -->
        <nav class="flex text-sm font-medium" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse whitespace-nowrap">
                <li class="inline-flex items-center">
                    <a href="{{ url_for('main.index') }}"
                        class="inline-flex items-center text-slate-500 hover:text-slate-900 dark:text-white/40 dark:hover:text-white transition-colors">
                        <i class="fa-solid fa-house mr-1.5 text-xs"></i>
                        <span class="hidden sm:inline">Accueil</span>
                    </a>
                </li>

                {% if breadcrumbs %}
                {% for crumb in breadcrumbs %}
                <li>
                    <div class="flex items-center">
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-400 dark:text-white/20 mx-1.5"></i>
                        {% if crumb.url and not loop.last %}
                        <a href="{{ crumb.url }}"
                            class="text-slate-500 hover:text-primary-500 dark:text-white/40 dark:hover:text-primary-400 transition-colors">
                            {{ crumb.name }}
                        </a>
                        {% else %}
                        <span class="text-primary-600 dark:text-primary-400 font-bold" aria-current="page">{{ crumb.name
                            }}</span>
                        {% endif %}
                    </div>
                </li>
                {% endfor %}
                {% endif %}
            </ol>
        </nav>
    </div>
</header>
