services:
  mongodb_preprod:
    image: mongo:latest
    container_name: footapp_mongodb_preprod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-FootClubApp_PreProd}
    volumes:
      - mongodb_data_preprod:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web_preprod:
    build: .
    container_name: footapp_web_preprod
    restart: always
    depends_on:
      mongodb_preprod:
        condition: service_healthy
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-preprod}
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongodb_preprod:27017/${MONGO_DATABASE:-FootClubApp_PreProd}?authSource=admin
      - FLASK_ENV=development
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    networks:
      - default
      - root_default
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.footapp-preprod.rule=Host(`preprod.takurte.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.footapp-preprod.entrypoints=websecure"
      - "traefik.http.routers.footapp-preprod.tls=true"
      - "traefik.http.routers.footapp-preprod.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.footapp-preprod.priority=10"
      - "traefik.http.services.footapp-preprod.loadbalancer.server.port=5000"

  frontend_preprod:
    build: ./frontend
    container_name: footapp_frontend_preprod
    restart: always
    depends_on:
      web_preprod:
        condition: service_healthy
    networks:
      - default
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.footapp-frontend-preprod.rule=Host(`preprod.takurte.fr`)"
      - "traefik.http.routers.footapp-frontend-preprod.entrypoints=websecure"
      - "traefik.http.routers.footapp-frontend-preprod.tls=true"
      - "traefik.http.routers.footapp-frontend-preprod.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.footapp-frontend-preprod.priority=1"
      - "traefik.http.services.footapp-frontend-preprod.loadbalancer.server.port=80"

volumes:
  mongodb_data_preprod:

networks:
  root_default:
    external: true
