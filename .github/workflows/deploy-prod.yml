name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ~/footapp_project
          git stash
          git fetch origin
          git checkout main
          git pull origin main

      - name: Ensure Docker network
        run: docker network inspect root_default >/dev/null 2>&1 || docker network create root_default

      - name: Ensure Traefik config
        run: |
          cd ~/footapp_project
          mkdir -p traefik_data
          [ -f traefik_data/acme.json ] || { touch traefik_data/acme.json && chmod 600 traefik_data/acme.json; }

      - name: Start Traefik
        run: |
          cd ~/footapp_project
          docker compose -f docker-compose.traefik.yml up -d

      - name: Build & deploy Production
        run: |
          cd ~/footapp_project
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Health check
        run: |
          sleep 15
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep footapp
          echo "Production deployment completed!"
